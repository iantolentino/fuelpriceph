name: Scrape Fuel Prices

on:
  schedule:
    - cron: '0 */3 * * *'  # Run every 3 hours
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
    
    - name: Run scraper
      run: python scraper.py
      continue-on-error: false  # Stop if scraper fails
    
    - name: Verify file was created
      run: |
        if [ -f data/fuel_prices.json ]; then
          echo "✅ File created successfully"
          cat data/fuel_prices.json
        else
          echo "❌ File not created"
          exit 1
        fi
    
    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/fuel_prices.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update fuel prices [skip ci]" && git push)