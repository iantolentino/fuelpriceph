name: Scrape Fuel Prices

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:        # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4
    
    - name: Run scraper
      run: python scraper.py
    
    - name: Check if file was created
      run: |
        ls -la data/ || echo "Data folder not found"
        cat data/fuel_prices.json || echo "No JSON file"
    
    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/fuel_prices.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update fuel prices [skip ci]" && git push)
